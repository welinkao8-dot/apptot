name: Client App - Production APK Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inject Production API URLs
        run: |
          # Substitui a URL da API do Cliente (Login, Perfil, Serviços)
          sed -i "s|http://localhost:3001|https://api.taxitot.com|g" \
            client-portal/mobile/src/services/api.js
          # Substitui a URL do Socket/Driver API (Corridas em tempo real)
          sed -i "s|http://localhost:3004|https://driver-api.taxitot.com|g" \
            client-portal/mobile/src/services/socket.js

      - name: Fix PNG Assets (Force 8-bit RGBA for AAPT2 compatibility)
        run: |
          pip install Pillow --quiet
          python3 - <<'EOF'
          import os
          import glob
          from PIL import Image

          for f in glob.glob('client-portal/mobile/src/assets/**/*.png', recursive=True):
              try:
                  img = Image.open(f)
                  # Forçar conversão para RGBA 8-bit (formato exigido pelo AAPT2)
                  img = img.convert('RGBA')
                  img.save(f, 'PNG', optimize=False)
                  print(f'Fixed: {f}')
              except Exception as e:
                  print(f'Error: {f} -> {e}')
          EOF

      - name: Install Dependencies
        working-directory: client-portal/mobile
        run: npm install --legacy-peer-deps

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64_CLIENT }}" | base64 --decode > client-portal/mobile/android/app/release.keystore

      - name: Build Production APK (Release)
        working-directory: client-portal/mobile/android
        env:
          ANDROID_KEYSTORE_FILE: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS_CLIENT }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: client-app-release-apk
          path: client-portal/mobile/android/app/build/outputs/apk/release/*.apk
